  <main class="page">
    <h1>MeaningBuddy</h1>
    <p class="subtitle">
      Compare two versions of text and show what changed in plain language.
    </p>

    <section class="panel">
      <div class="input-grid">
        <div>
          <label for="originalText">Original Text</label>
          <textarea id="originalText" placeholder="Paste the earlier version here..."></textarea>
        </div>

        <div>
          <label for="revisedText">Revised Text</label>
          <textarea id="revisedText" placeholder="Paste the updated version here..."></textarea>
        </div>
      </div>

      <div class="button-row">
        <button class="primary" id="compareBtn">Compare</button>
        <button class="secondary" id="clearBtn">Clear</button>
      </div>
    </section>

    <section class="results-grid">
      <div class="result-box full">
        <h3>Summary</h3>
        <div id="summary" class="empty">No comparison yet.</div>
      </div>

      <div class="result-box">
        <h3>Detected Changes</h3>
        <div id="changes" class="empty">No detected changes yet.</div>
      </div>

      <div class="result-box">
        <h3>Structural Categories</h3>
        <div id="categories" class="empty">No categories yet.</div>
      </div>

      <div class="result-box full">
        <h3>Operational Effect</h3>
        <div id="effect" class="empty">No operational effect yet.</div>
      </div>
    </section>
  </main>

  <script>
    const originalText = document.getElementById("originalText");
    const revisedText = document.getElementById("revisedText");
    const compareBtn = document.getElementById("compareBtn");
    const clearBtn = document.getElementById("clearBtn");

    const summary = document.getElementById("summary");
    const changes = document.getElementById("changes");
    const categories = document.getElementById("categories");
    const effect = document.getElementById("effect");

    function renderList(target, items) {
      if (!items.length) {
        target.innerHTML = '<div class="empty">None.</div>';
        return;
      }

      const ul = document.createElement("ul");
      items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        ul.appendChild(li);
      });

      target.innerHTML = "";
      target.appendChild(ul);
    }

    compareBtn.addEventListener("click", () => {
      const original = originalText.value.trim();
      const revised = revisedText.value.trim();

      if (!original || !revised) {
        alert("Paste text into both boxes first.");
        return;
      }

      const foundChanges = [];
      const foundCategories = [];

      const originalLower = original.toLowerCase();
      const revisedLower = revised.toLowerCase();

      if (originalLower.includes("shall") && revisedLower.includes("may")) {
        foundChanges.push("Changed 'shall' to 'may'");
        foundCategories.push("Modality Shift");
      }

      if (originalLower.includes("must") && revisedLower.includes("may")) {
        foundChanges.push("Changed 'must' to 'may'");
        foundCategories.push("Modality Shift");
      }

      if (originalLower.includes("all") && revisedLower.includes("eligible")) {
        foundChanges.push("Changed 'all' to 'eligible'");
        foundCategories.push("Scope Change");
      }

      if (originalLower.includes("30 days") && revisedLower.includes("reasonable timeframe")) {
        foundChanges.push("Changed 'within 30 days' to 'within a reasonable timeframe'");
        foundCategories.push("Threshold / Standard Shift");
      }

      if (!foundChanges.length && original !== revised) {
        foundChanges.push("Text changed, but no rule-based category matched yet.");
      }

      summary.textContent =
        original === revised
          ? "The two versions appear to be the same."
          : "The two versions are different and may contain structural language changes.";

      renderList(changes, foundChanges);
      renderList(categories, [...new Set(foundCategories)]);

      effect.textContent =
        foundCategories.length
          ? "The wording changes may affect how the text is applied, interpreted, or enforced."
          : "No structured operational effect detected yet.";
    });

    clearBtn.addEventListener("click", () => {
      originalText.value = "";
      revisedText.value = "";
      summary.innerHTML = '<div class="empty">No comparison yet.</div>';
      changes.innerHTML = '<div class="empty">No detected changes yet.</div>';
      categories.innerHTML = '<div class="empty">No categories yet.</div>';
      effect.innerHTML = '<div class="empty">No operational effect yet.</div>';
    });
  </script>

const inputText = document.getElementById("inputText");
const analyzeBtn = document.getElementById("analyzeBtn");
const clearBtn = document.getElementById("clearBtn");

const plainMeaning = document.getElementById("plainMeaning");
const actorResult = document.getElementById("actorResult");
const ruleStrengthResult = document.getElementById("ruleStrengthResult");
const scopeResult = document.getElementById("scopeResult");
const actionResult = document.getElementById("actionResult");
const timingResult = document.getElementById("timingResult");
const vagueResult = document.getElementById("vagueResult");
const effectResult = document.getElementById("effectResult");

function analyzeLanguage() {
  const text = inputText.value.trim();
  const lower = text.toLowerCase();

  if (!text) {
    alert("Paste text first.");
    return;
  }

  let actor = "Not clearly identified.";
  let ruleStrength = "Not clearly identified.";
  let scope = "Not clearly identified.";
  let action = "Not clearly identified.";
  let timing = "No timing or standard detected.";
  let vague = "No obvious flexible wording detected.";
  let plain = "Plain meaning not generated yet.";
  let effect = "Operational effect not clear yet.";

  if (lower.includes("agency")) actor = "The agency has the authority or responsibility.";
  else if (lower.includes("court")) actor = "The court has the authority or responsibility.";
  else if (lower.includes("company")) actor = "The company has the authority or responsibility.";
  else if (lower.includes("employer")) actor = "The employer has the authority or responsibility.";

  if (lower.includes("shall") || lower.includes("must")) {
    ruleStrength = "The action is required.";
  } else if (lower.includes("may") || lower.includes("can")) {
    ruleStrength = "The action is optional.";
  } else if (lower.includes("should")) {
    ruleStrength = "The action is recommended.";
  }

  if (lower.includes("all employees")) {
    scope = "This applies to all employees.";
  } else if (lower.includes("eligible employees")) {
    scope = "This applies only to eligible employees.";
  } else if (lower.includes("individuals")) {
    scope = "This applies to the individuals named in the text.";
  }

  if (lower.includes("provide notice")) {
    action = "The action is to provide notice.";
  } else if (lower.includes("appear")) {
    action = "The action is to appear.";
  } else if (lower.includes("submit")) {
    action = "The action is to submit something.";
  } else if (lower.includes("report")) {
    action = "The action is to report information.";
  }

  if (lower.includes("within 30 days")) {
    timing = "There is a fixed 30-day deadline.";
  } else if (lower.includes("reasonable timeframe")) {
    timing = "The timing is flexible, not fixed.";
  } else if (lower.includes("immediately")) {
    timing = "The action must happen right away.";
  }

  const vagueTerms = [];
  if (lower.includes("reasonable")) vagueTerms.push("reasonable");
  if (lower.includes("appropriate")) vagueTerms.push("appropriate");
  if (lower.includes("as determined by")) vagueTerms.push("as determined by");
  if (lower.includes("where applicable")) vagueTerms.push("where applicable");
  if (lower.includes("may")) vagueTerms.push("may");

  if (vagueTerms.length) {
    vague = "Flexible or vague wording detected: " + vagueTerms.join(", ") + ".";
  }

  plain = "This text sets out who can act, how strong the rule is, who it applies to, and whether the timing is fixed or flexible.";
  effect = "This wording affects who has power, who is covered, and how strictly the action must happen.";

  plainMeaning.textContent = plain;
  actorResult.textContent = actor;
  ruleStrengthResult.textContent = ruleStrength;
  scopeResult.textContent = scope;
  actionResult.textContent = action;
  timingResult.textContent = timing;
  vagueResult.textContent = vague;
  effectResult.textContent = effect;
}

function clearResults() {
  inputText.value = "";
  plainMeaning.textContent = "The explanation will appear here.";
  actorResult.textContent = "";
  ruleStrengthResult.textContent = "";
  scopeResult.textContent = "";
  actionResult.textContent = "";
  timingResult.textContent = "";
  vagueResult.textContent = "";
  effectResult.textContent = "";
}

analyzeBtn.addEventListener("click", analyzeLanguage);
clearBtn.addEventListener("click", clearResults);
</script>

<script>

const originalText = document.getElementById("originalText");
const revisedText = document.getElementById("revisedText");
const compareBtn = document.getElementById("compareBtn");
const clearBtn = document.getElementById("clearBtn");

const summary = document.getElementById("summary");
const changes = document.getElementById("changes");
const categories = document.getElementById("categories");
const effect = document.getElementById("effect");


function renderList(target, items, emptyText) {

  if (!items.length) {
    target.innerHTML = `<div>${emptyText}</div>`;
    return;
  }

  const ul = document.createElement("ul");

  items.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item;
    ul.appendChild(li);
  });

  target.innerHTML = "";
  target.appendChild(ul);
}


function compareTexts() {

  const original = originalText.value.trim();
  const revised = revisedText.value.trim();

  if (!original || !revised) {
    alert("Paste text into both boxes first.");
    return;
  }

  const originalLower = original.toLowerCase();
  const revisedLower = revised.toLowerCase();

  const foundChanges = [];
  const foundCategories = [];


  if (originalLower.includes("shall") && revisedLower.includes("may")) {
    foundChanges.push(`Modality change: "shall" → "may"`);
    foundCategories.push("Modality Shift");
  }

  if (originalLower.includes("must") && revisedLower.includes("may")) {
    foundChanges.push(`Modality change: "must" → "may"`);
    foundCategories.push("Modality Shift");
  }

  if (originalLower.includes("all") && revisedLower.includes("eligible")) {
    foundChanges.push(`Scope change: "all" → "eligible"`);
    foundCategories.push("Scope Change");
  }

  if (originalLower.includes("within 30 days") && revisedLower.includes("reasonable timeframe")) {
    foundChanges.push(`Threshold change: "within 30 days" → "within a reasonable timeframe"`);
    foundCategories.push("Threshold / Standard Shift");
  }


  if (original !== revised && foundChanges.length === 0) {
    foundChanges.push("Text changed, but no structural rule matched yet.");
  }


  summary.textContent =
    original === revised
      ? "The two versions appear to say the same thing."
      : "The two versions are different and may change how the text works.";


  renderList(changes, foundChanges, "No detected changes yet.");

  renderList(categories, [...new Set(foundCategories)], "No categories yet.");


  effect.textContent =
    foundCategories.length
      ? "These wording changes may affect how the text is applied, interpreted, or enforced."
      : "No clear operational effect detected yet.";

}


function clearTexts() {

  originalText.value = "";
  revisedText.value = "";

  summary.innerHTML = "No comparison yet.";
  changes.innerHTML = "No detected changes yet.";
  categories.innerHTML = "No categories yet.";
  effect.innerHTML = "No operational effect yet.";

}


compareBtn.addEventListener("click", compareTexts);
clearBtn.addEventListener("click", clearTexts);

</script>
